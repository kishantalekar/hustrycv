name: Android Play Store Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play Store Track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install JavaScript dependencies
        run: yarn install

      - name: Create .env file
        env:
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          echo "GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY}" > .env
          echo "POSTHOG_API_KEY=${POSTHOG_API_KEY}" >> .env
          echo "POSTHOG_HOST=${POSTHOG_HOST:-https://us.i.posthog.com}" >> .env

      - name: Set up Ruby & Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          working-directory: android
          bundler-cache: true

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is missing!"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/my-release-key.keystore

      - name: Write Google Play Service Account JSON Key
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          if [ -z "$PLAY_STORE_JSON_KEY" ]; then
            echo "ERROR: PLAY_STORE_JSON_KEY secret is missing!"
            exit 1
          fi
          mkdir -p android/keys
          echo "$PLAY_STORE_JSON_KEY" > android/keys/play-store-key.json

      - name: Build and Deploy via Fastlane
        env:
          PLAY_STORE_TRACK: ${{ github.event.inputs.track || 'internal' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          cd android
          bundle exec fastlane deploy
